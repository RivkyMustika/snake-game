<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Snake Battle</title>

<style>

body{

margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;

}

canvas{

background:black;
border:3px solid #00ff88;
width:95vw;
max-width:500px;

}

button{

background:#00ff88;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:6px;
margin-top:10px;

}

input{

padding:8px;
margin:5px;
border-radius:5px;
border:none;
text-align:center;

}

#menu{

margin-top:40px;

}

#gameUI{

display:none;

}

#winner{

font-size:22px;
margin-top:10px;

}

</style>

</head>

<body>

<div id="menu">

<h2>Snake Battle</h2>

<div>

<input id="name1" placeholder="Player 1">

<input id="name2" placeholder="Player 2">

</div>

<button onclick="startGame()">

Start Game

</button>

<p>

Left screen = P1 swipe  
Right screen = P2 swipe  

</p>

</div>


<div id="gameUI">

<h3 id="score"></h3>

<canvas id="game" width="400" height="400"></canvas>

<div id="winner"></div>

<button onclick="restart()">

Restart

</button>

</div>


<script>

const canvas=document.getElementById("game");

const ctx=canvas.getContext("2d");

const grid=20;

let running=false;

let p1,p2,apple;

let name1="P1";

let name2="P2";

function reset(){

p1={x:40,y:200,dx:20,dy:0,cells:[],max:4,alive:true,score:0};

p2={x:340,y:200,dx:-20,dy:0,cells:[],max:4,alive:true,score:0};

apple={x:200,y:200};

}

function startGame(){

name1=document.getElementById("name1").value||"Player1";

name2=document.getElementById("name2").value||"Player2";

document.getElementById("menu").style.display="none";

document.getElementById("gameUI").style.display="block";

reset();

countdown(3);

}

function countdown(n){

document.getElementById("winner").innerText=

"Starting in "+n;

if(n==0){

running=true;

document.getElementById("winner").innerText="";

return;

}

setTimeout(()=>countdown(n-1),700);

}

function rand(){

apple.x=Math.floor(Math.random()*20)*grid;

apple.y=Math.floor(Math.random()*20)*grid;

}

function move(s){

if(!s.alive) return;

s.x+=s.dx;

s.y+=s.dy;

if(s.x<0||s.x>380||s.y<0||s.y>380){

s.alive=false;

return;

}

s.cells.unshift({x:s.x,y:s.y});

if(s.cells.length>s.max){

s.cells.pop();

}

}

function eat(s){

if(!s.alive)return;

if(s.x==apple.x && s.y==apple.y){

s.max++;

s.score++;

rand();

}

}

function collision(){

if(!p1.alive||!p2.alive)return;

p1.cells.forEach(c=>{

if(p2.x==c.x && p2.y==c.y){

p2.alive=false;

}

});

p2.cells.forEach(c=>{

if(p1.x==c.x && p1.y==c.y){

p1.alive=false;

}

});

}

function draw(s,color){

if(!s.alive)return;

ctx.fillStyle=color;

s.cells.forEach(c=>{

ctx.fillRect(c.x,c.y,19,19);

});

}

function gameLoop(){

if(!running)return;

ctx.clearRect(0,0,400,400);

move(p1);

move(p2);

eat(p1);

eat(p2);

collision();

ctx.fillStyle="red";

ctx.fillRect(apple.x,apple.y,19,19);

draw(p1,"#00ff88");

draw(p2,"#00aaff");

document.getElementById("score").innerText=

name1+" : "+p1.score+
" | "+
name2+" : "+p2.score;

if(!p1.alive||!p2.alive){

running=false;

let win=

p1.score>p2.score?name1:name2;

document.getElementById("winner").innerText=

"Winner : "+win;

}

}

setInterval(gameLoop,120);



document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp"&&p1.dy==0){

p1.dy=-20;p1.dx=0;

}

if(e.key==="ArrowDown"&&p1.dy==0){

p1.dy=20;p1.dx=0;

}

if(e.key==="ArrowLeft"&&p1.dx==0){

p1.dx=-20;p1.dy=0;

}

if(e.key==="ArrowRight"&&p1.dx==0){

p1.dx=20;p1.dy=0;

}



if(e.key==="w"&&p2.dy==0){

p2.dy=-20;p2.dx=0;

}

if(e.key==="s"&&p2.dy==0){

p2.dy=20;p2.dx=0;

}

if(e.key==="a"&&p2.dx==0){

p2.dx=-20;p2.dy=0;

}

if(e.key==="d"&&p2.dx==0){

p2.dx=20;p2.dy=0;

}

});


let sx,sy,player;

canvas.addEventListener("touchstart",e=>{

let t=e.touches[0];

sx=t.clientX;

sy=t.clientY;

player=

t.clientX<window.innerWidth/2?1:2;

});


canvas.addEventListener("touchend",e=>{

let t=e.changedTouches[0];

let dx=t.clientX-sx;

let dy=t.clientY-sy;

if(Math.abs(dx)>Math.abs(dy)){

if(dx>0){

if(player==1&&p1.dx==0){

p1.dx=20;p1.dy=0;

}

if(player==2&&p2.dx==0){

p2.dx=20;p2.dy=0;

}

}else{

if(player==1&&p1.dx==0){

p1.dx=-20;p1.dy=0;

}

if(player==2&&p2.dx==0){

p2.dx=-20;p2.dy=0;

}

}

}else{

if(dy>0){

if(player==1&&p1.dy==0){

p1.dy=20;p1.dx=0;

}

if(player==2&&p2.dy==0){

p2.dy=20;p2.dx=0;

}

}else{

if(player==1&&p1.dy==0){

p1.dy=-20;p1.dx=0;

}

if(player==2&&p2.dy==0){

p2.dy=-20;p2.dx=0;

}

}

}

});


function restart(){

reset();

running=true;

document.getElementById("winner").innerText="";

}

</script>

</body>

</html>
