<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Snake Multiplayer</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:black;
border:3px solid #00ff88;
width:95vw;
max-width:500px;
margin-top:10px;
touch-action:none;
}

.score{

display:flex;
justify-content:space-around;
font-size:18px;

}

.info{

font-size:13px;
opacity:.7;
margin-top:5px;

}

</style>

</head>

<body>

<h2>Snake Battle</h2>

<div class="score">

<div id="s1">P1 : 0</div>

<div id="s2">P2 : 0</div>

</div>




<canvas id="game" width="400" height="400"></canvas>
<div class="info">

Swipe left side = Player1  
Swipe right side = Player2  

</div>


<script>

const canvas=document.getElementById("game");

const ctx=canvas.getContext("2d");

const grid=20;

let p1={
x:40,
y:200,
dx:20,
dy:0,
cells:[],
max:4,
score:0
};

let p2={
x:340,
y:200,
dx:-20,
dy:0,
cells:[],
max:4,
score:0
};

let apple={x:200,y:200};

function rand(){

apple.x=Math.floor(Math.random()*20)*grid;

apple.y=Math.floor(Math.random()*20)*grid;

}

function move(s){

s.x+=s.dx;

s.y+=s.dy;

if(s.x<0)s.x=380;

if(s.x>380)s.x=0;

if(s.y<0)s.y=380;

if(s.y>380)s.y=0;

s.cells.unshift({x:s.x,y:s.y});

if(s.cells.length>s.max){

s.cells.pop();

}

}

function draw(s,color){

ctx.fillStyle=color;

s.cells.forEach(c=>{

ctx.fillRect(c.x,c.y,19,19);

});

}

function eat(s){

if(s.x===apple.x && s.y===apple.y){

s.max++;

s.score++;

rand();

}

}

function selfHit(s){

for(let i=1;i<s.cells.length;i++){

if(s.x===s.cells[i].x &&
s.y===s.cells[i].y){

s.cells=[];

s.max=4;

s.score=0;

}

}

}

function hitCheck(){

p1.cells.forEach(c=>{

if(p2.x===c.x && p2.y===c.y){

p2.cells=[];

p2.max=4;

p2.score=0;

}

});

p2.cells.forEach(c=>{

if(p1.x===c.x && p1.y===c.y){

p1.cells=[];

p1.max=4;

p1.score=0;

}

});

}

function loop(){

ctx.clearRect(0,0,400,400);

move(p1);

move(p2);

eat(p1);

eat(p2);

selfHit(p1);

selfHit(p2);

hitCheck();

ctx.fillStyle="red";

ctx.fillRect(apple.x,apple.y,19,19);

draw(p1,"#00ff88");

draw(p2,"#00aaff");

document.getElementById("s1").innerText="P1 : "+p1.score;

document.getElementById("s2").innerText="P2 : "+p2.score;

}

setInterval(loop,120);



document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp" && p1.dy===0){

p1.dy=-20;p1.dx=0;

}

if(e.key==="ArrowDown" && p1.dy===0){

p1.dy=20;p1.dx=0;

}

if(e.key==="ArrowLeft" && p1.dx===0){

p1.dx=-20;p1.dy=0;

}

if(e.key==="ArrowRight" && p1.dx===0){

p1.dx=20;p1.dy=0;

}



if(e.key==="w" && p2.dy===0){

p2.dy=-20;p2.dx=0;

}

if(e.key==="s" && p2.dy===0){

p2.dy=20;p2.dx=0;

}

if(e.key==="a" && p2.dx===0){

p2.dx=-20;p2.dy=0;

}

if(e.key==="d" && p2.dx===0){

p2.dx=20;p2.dy=0;

}

});


let startX,startY,player;

canvas.addEventListener("touchstart",e=>{

let t=e.touches[0];

startX=t.clientX;

startY=t.clientY;

player = (t.clientX < window.innerWidth/2) ? 1 : 2;

});


canvas.addEventListener("touchend",e=>{

let t=e.changedTouches[0];

let dx=t.clientX-startX;

let dy=t.clientY-startY;

if(Math.abs(dx)>Math.abs(dy)){

if(dx>0){

if(player===1 && p1.dx===0){

p1.dx=20;p1.dy=0;

}

if(player===2 && p2.dx===0){

p2.dx=20;p2.dy=0;

}

}

else{

if(player===1 && p1.dx===0){

p1.dx=-20;p1.dy=0;

}

if(player===2 && p2.dx===0){

p2.dx=-20;p2.dy=0;

}

}

}

else{

if(dy>0){

if(player===1 && p1.dy===0){

p1.dy=20;p1.dx=0;

}

if(player===2 && p2.dy===0){

p2.dy=20;p2.dx=0;

}

}

else{

if(player===1 && p1.dy===0){

p1.dy=-20;p1.dx=0;

}

if(player===2 && p2.dy===0){

p2.dy=-20;p2.dx=0;

}

}

}

});

</script>

</body>

</html>
